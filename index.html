<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#18121f">
    <title>Dungeon of Cards</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260702-3">
  </head>
  <body>
    <main id="app" class="shell">
      <canvas id="game" width="1280" height="800" aria-label="Dungeon of Cards game table"></canvas>
      <div id="toast" class="toast" hidden></div>

      <section id="signalPanel" class="signal-panel" hidden>
        <div class="signal-card">
          <div class="signal-head">
            <div>
              <h1 id="signalTitle">Lobby</h1>
              <p id="signalText">Copy and paste the connection text.</p>
            </div>
            <button id="closeSignal" class="icon-btn" aria-label="Close">x</button>
          </div>

          <div id="hostFields" class="signal-fields" hidden>
            <label>
              Lobby link
              <textarea id="hostOffer" readonly spellcheck="false"></textarea>
            </label>
            <div class="action-row">
              <button id="copyOffer">Copy Link</button>
              <button id="shareOffer" class="primary">Share Link</button>
            </div>
          </div>

          <div id="joinFields" class="signal-fields" hidden>
            <label>
              Lobby code or link
              <input id="lobbyCode" maxlength="160" autocomplete="off" spellcheck="false" placeholder="ABCD or pasted link">
            </label>
            <button id="joinByCode" class="primary">Join Lobby</button>
          </div>

          <div id="nameFields" class="signal-fields" hidden>
            <label>
              Display name
              <input id="playerName" maxlength="20" autocomplete="nickname" spellcheck="false" placeholder="Card sharp">
            </label>
            <button id="saveName" class="primary">Save Name</button>
          </div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="this.onerror=null;this.src='https://unpkg.com/@supabase/supabase-js@2'"></script>
    <script type="module" src="./src/app.js?v=20260714-push235-smooth-player-card-animation"></script>
  </body>
</html>

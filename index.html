<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#18121f">
    <title>Dungeon of Cards</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main id="app" class="shell">
      <canvas id="game" width="1280" height="800" aria-label="Dungeon of Cards game table"></canvas>

      <section id="signalPanel" class="signal-panel" hidden>
        <div class="signal-card">
          <div class="signal-head">
            <div>
              <h1 id="signalTitle">Lobby</h1>
              <p id="signalText">Copy and paste the connection text.</p>
            </div>
            <button id="closeSignal" class="icon-btn" aria-label="Close">x</button>
          </div>

          <div id="hostFields" class="signal-fields" hidden>
            <label>
              Host invite
              <textarea id="hostOffer" readonly spellcheck="false"></textarea>
            </label>
            <button id="copyOffer">Copy Invite</button>
            <label>
              Guest answer
              <textarea id="guestAnswer" spellcheck="false" placeholder="Paste guest answer here"></textarea>
            </label>
            <button id="acceptAnswer" class="primary">Accept Answer</button>
          </div>

          <div id="joinFields" class="signal-fields" hidden>
            <label>
              Host invite
              <textarea id="joinOffer" spellcheck="false" placeholder="Paste host invite here"></textarea>
            </label>
            <button id="createAnswer" class="primary">Create Answer</button>
            <label>
              Your answer
              <textarea id="joinAnswer" readonly spellcheck="false"></textarea>
            </label>
            <button id="copyAnswer">Copy Answer</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
